name: Refresh News & Portfolio Data

on:
  schedule:
    - cron: '0 */12 * * *' # Every 12 hours
  workflow_dispatch:       # Supports manual trigger via GitHub website/API

permissions:
  contents: write          # Required to push changes back to the repo

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f scripts/requirements.txt ]; then pip install -r scripts/requirements.txt; fi

      - name: Run News Fetcher
        run: python scripts/fetch_news.py

      - name: Run Portfolio Tracker
        run: python scripts/fetch_portfolio.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to data."
          else
            git commit -m "chore: automated news and portfolio update"
            git push
          fi
